<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

<body>
 <form class="container">
  <!-- Use g-3 for consistent padding/gutters between form rows and columns -->
  <div class="row g-3">
    <!-- Row 1: Email and Password side-by-side on medium screens and up -->
    <div class="col-md-3">
      <label for="inputState" class="form-label">Place</label>
      <select id="inputState" class="form-select">
        <option selected>Chennai</option>
        <option>Villupuram</option>
        <option>Tiruchi</option>
        <option>Madurai</option>
        <option>Thirunelveli</option>
        <option>Coimbatore</option>
        <option>Selem</option>
        <option>Kaniyakumari</option>
      </select>
    </div>
    <div class="col-md-3">
      <label for="inputPassword" class="form-label">Person</label>
      <input type="number" class="form-control" id="inputPassword" placeholder="adult ">
    </div>

    <div class="col-md-2">
      <label for="inputAddress" class="form-label">Check IN</label>
      <input type="date" class="form-control" id="inputAddress" >
    </div>

    <div class="col-md-2">
      <label for="inputAddress" class="form-label">Check OUT</label>
      <input type="date" class="form-control" id="inputAddress" >
    </div>

    
    <div class="col-md-2">
      <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
  </div>
</form>

    
</body>
</html>
